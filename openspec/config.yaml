schema: spec-driven

context: |
  Tech stack: Vanilla CSS
  Domain: Dependency-free infographic CSS library tailored for LLMs to generate.
  Conventions: 
    - Zero JavaScript
    - Zero external dependencies (fonts, CDNs, frameworks)
    - Must be usable embedded in a single HTML file or linked as a standalone `infographic.css`
    - Use strict naming conventions: `ig-{family}-{element}--{variant}`
    - Visual theme relies entirely on a 2-layer CSS custom property architecture
    - Reset is scoped to the `ig-page` container

rules:
  design:
    - Never recommend JS-based interactivity or external resources.
  specs:
    - Ensure rules are completely explicit so an LLM doesn't need to interpret them.
