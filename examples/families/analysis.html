<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Analysis Example</title>
    <link rel="stylesheet" href="../../infographic.css" />
  </head>
  <body class="ig-page">
    <header class="ig-header">
      <h1 class="ig-header-title">Change assessment</h1>
      <p class="ig-header-subtitle">Qualitative judgments across a small set of items.</p>
    </header>
    <main class="ig-main ig-analysis">
      <div class="ig-analysis-grid">
        <article class="ig-analysis-item ig-analysis-item--positive">
          <span class="ig-analysis-item-label">Scope</span>
          <strong class="ig-analysis-item-value">Clear</strong>
        </article>
        <article class="ig-analysis-item ig-analysis-item--neutral">
          <span class="ig-analysis-item-label">Risk</span>
          <strong class="ig-analysis-item-value">Moderate</strong>
        </article>
        <article class="ig-analysis-item ig-analysis-item--negative">
          <span class="ig-analysis-item-label">Effort</span>
          <strong class="ig-analysis-item-value">High</strong>
        </article>
      </div>
    </main>
  </body>
</html>
